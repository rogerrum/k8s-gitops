cilium:
  autoDirectNodeRoutes: true
  bandwidthManager:
    enabled: true
    bbr: true
  bpf:
    datapathMode: netkit
    masquerade: true
    preallocateMaps: true
    # Reduce memory pressure and improve packet processing
    monitorAggregation: maximum
    monitorInterval: 5s
    monitorFlags: all
  bgpControlPlane:
    enabled: true
#  cgroup:
    #automount:
    #  enabled: false
    #hostRoot: /sys/fs/cgroup
  cluster:
    id: 1
    name: main
  cni:
    exclusive: false
  dashboards:
    enabled: true
    annotations:
      grafana_folder: networking
  endpointRoutes:
    enabled: true
  envoy:
    enabled: true
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
  gatewayAPI:
    enabled: false
  hubble:
    enabled: true
    metrics:
      enabled:
        - dns:query
        - drop
        - tcp
        - flow
        - port-distribution
        - icmp
        - http
      serviceMonitor:
        enabled: true
      dashboards:
        enabled: true
        annotations:
          grafana_folder: networking
    relay:
      enabled: true
      rollOutPods: true
      prometheus:
        serviceMonitor:
          enabled: true
    ui:
      enabled: true
      rollOutPods: true
      ingress:
        enabled: false
  ipam:
    mode: kubernetes
  ipv4NativeRoutingCIDR: 10.42.0.0/16
  k8sServiceHost: 127.0.0.1
  k8sServicePort: 6443
  kubeProxyReplacement: true
  kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256
  l2announcements:
    enabled: false
  loadBalancer:
    algorithm: maglev
    mode: dsr
  localRedirectPolicy: true
  operator:
    dashboards:
      enabled: true
      annotations:
        grafana_folder: networking
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
    replicas: 2
    rollOutPods: true
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      trustCRDsExist: true
  rollOutCiliumPods: true
  routingMode: native
  securityContext:
    capabilities:
      ciliumAgent:
        - CHOWN
        - KILL
        - NET_ADMIN
        - NET_RAW
        - IPC_LOCK
        - SYS_ADMIN
        - SYS_RESOURCE
        - PERFMON
        - BPF
        - DAC_OVERRIDE
        - FOWNER
        - SETGID
        - SETUID
      cleanCiliumState:
        - NET_ADMIN
        - SYS_ADMIN
        - SYS_RESOURCE
  socketLB:
    hostNamespaceOnly: true # needed for tailscale (https://tailscale.com/kb/1236/kubernetes-operator#cilium-in-kube-proxy-replacement-mode)

  # Tolerations for ARM nodes (from your config)
  tolerations:
    - key: "arm"
      operator: "Exists"
    - key: "arm64"
      operator: "Exists"
