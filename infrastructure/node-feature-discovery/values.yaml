node-feature-discovery:

  worker:
    config:
      core:
        sleepInterval: 300s
        sources:
          - custom
          - pci
          - usb
      sources:
        usb:
          deviceClassWhitelist:
            - "02"
            - "03"
            - "0e"
            - "ef"
            - "fe"
            - "ff"
          deviceLabelFields:
            - "class"
            - "vendor"
            - "device"


    annotations:
      configmap.reloader.stakater.com/reload: "nfd-worker-conf"
    tolerations:
#      - key: arm
#        operator: Exists
      - key: arm64
        operator: Exists
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
#      - effect: "NoExecute"
#        operator: "Exists"
      - effect: "NoSchedule"
        operator: "Exists"
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 5
    readinessProbe:
      initialDelaySeconds: 15
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 10
  master:
    replicaCount: 1
    tolerations:
#      - key: arm
#        operator: Exists
      - key: arm64
        operator: Exists
