app-template:
  configMaps:
    verdaccio-config:
      suffix: verdaccio-config
      data:
        config.yaml: |-
          storage: /verdaccio/storage/data
          auth:
            htpasswd:
              file: /verdaccio/storage/htpasswd
              max_users: -1  # disable registration
          uplinks:
            npmjs:
              url: https://registry.npmjs.org/
              timeout: 60s
              maxage: 10m
          packages:
            '@*/*':
              access: $all
              proxy: npmjs
            '**':
              access: $all
              proxy: npmjs
          log:
            type: stdout
            format: pretty
            level: warn

  controllers:
    verdaccio:
      containers:
        main:
          image:
            repository: verdaccio/verdaccio
            tag: 6.1.3
          env:
            VERDACCIO_PORT: "4873"
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi

    devpi:
      containers:
        main:
          image:
            repository: ghcr.io/muccg/devpi
            tag: latest
          command:
            - devpi-server
            - --host=0.0.0.0
            - --port=3141
            - --serverdir=/data
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi

  service:
    verdaccio:
      controller: verdaccio
      ports:
        http:
          port: 4873
    devpi:
      controller: devpi
      ports:
        http:
          port: 3141

  persistence:
    verdaccio-config:
      type: configMap
      identifier: verdaccio-config
      advancedMounts:
        verdaccio:
          main:
            - path: /verdaccio/conf
    verdaccio-data:
      type: persistentVolumeClaim
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 10Gi
      advancedMounts:
        verdaccio:
          main:
            - path: /verdaccio/storage
    devpi-data:
      type: persistentVolumeClaim
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 10Gi
      advancedMounts:
        devpi:
          main:
            - path: /data
