apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-signing-key
  namespace: default
  labels:
    app.kubernetes.io/instance: {{ $.Release.Name }}  # Add this!
    app.kubernetes.io/part-of: {{ $.Release.Name }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: forgejo-signing-key
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        ed25519: '{{ printf "{{ .forgejo_signing_private_key }}" }}'
        ed25519.pub: '{{ printf "{{ .forgejo_signing_public_key }}" }}'
  dataFrom:
    - extract:
        key: forgejo-config
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-oidc
  namespace: default
  labels:
    app.kubernetes.io/instance: {{ $.Release.Name }}  # Add this!
    app.kubernetes.io/part-of: {{ $.Release.Name }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name:  forgejo-oidc
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        key: '{{ printf "{{ .forgejo_client_id }}" }}'
        secret: '{{ printf "{{ .forgejo_client_secret }}" }}'
  dataFrom:
    - extract:
        key: pocket-id-config
