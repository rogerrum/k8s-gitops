grafana:

  extraInitContainers:
    - name: init-db
      image: ghcr.io/onedr0p/postgres-init:17.4
      imagePullPolicy: IfNotPresent
      envFrom:
        - secretRef:
            name: grafana-secret

  rbac:
    pspEnabled: false
  deploymentStrategy:
    type: Recreate
  podAnnotations:
    configmap.reloader.stakater.com/reload: "grafana"
  env:
    GF_ANALYTICS_CHECK_FOR_UPDATES: false
    GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: false
    GF_ANALYTICS_REPORTING_ENABLED: false
    GF_AUTH_ANONYMOUS_ENABLED: false
    GF_DATE_FORMATS_USE_BROWSER_LOCALE: true
    GF_EXPLORE_ENABLED: true
    GF_GRAFANA_NET_URL: https://grafana.net
    GF_LOG_FILTERS: rendering:debug
    GF_LOG_MODE: console
    GF_FEATURE_TOGGLES_ENABLE: publicDashboards
    GF_NEWS_NEWS_FEED_ENABLED: false
    GF_PANELS_DISABLE_SANITIZE_HTML: true
    GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: natel-discrete-panel,pr0ps-trackmap-panel,panodata-map-panel
    GF_SECURITY_ALLOW_EMBEDDING: true
    # GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: true
    GF_SERVER_ROOT_URL: https://grafana.rsr.net
    GF_SECURITY_COOKIE_SAMESITE: grafana
  envFromSecrets:
    - name: grafana-secret

  plugins:
    - pr0ps-trackmap-panel
    - natel-plotly-panel
    - victoriametrics-logs-datasource
    - grafana-piechart-panel
    - https://github.com/panodata/panodata-map-panel/releases/download/0.16.0/panodata-map-panel-0.16.0.zip;grafana-worldmap-panel-ng
    - grafana-clock-panel
    - grafana-worldmap-panel
    - natel-discrete-panel
  serviceMonitor:
    enabled: true
  serviceAccount:
    autoMount: true
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          disableDeletion: false
          editable: true
          folder: ""
          options:
            path: /var/lib/grafana/dashboards/default
          orgId: 1
          type: file
        - name: infrastructure
          orgId: 1
          folder: infrastructure
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/infrastructure
        - name: networking
          orgId: 1
          folder: networking
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/networking
        - name: storage
          orgId: 1
          folder: storage
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/storage
        - name: node-metrics
          orgId: 1
          folder: node-metrics
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/node-metrics
        - name: kubernetes
          orgId: 1
          folder: Kubernetes
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/kubernetes
        - name: 'teslamate'
          orgId: 1
          folder: Teslamate
          type: file
          disableDeletion: false
          # updateIntervalSeconds: -1
          allowUiUpdates: true
          options:
            path: /var/lib/grafana/dashboards/teslamate
  dashboards:
    default:
      etcd:
        # renovate: dashboardName="etcd"
        gnetId: 22236
        revision: 4
        datasource: Prometheus
    infrastructure:
      cert-manager:
        gnetId: 20842
        revision: 3
        datasource: Prometheus
      cloudnative-pg:
        url: https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/main/docs/src/samples/monitoring/grafana-dashboard.json
        datasource: Prometheus
      argo-cd:
        url: https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.1/examples/dashboard.json
        datasource: Prometheus
      home-assistant:
        url: https://raw.githubusercontent.com/billimek/k8s-gitops/master/monitoring/grafana/dashboards/home_assistant.json
        datasource: home_assistant
      volsync:
        # removate: dashboardName="VolSync Dashboard"
        gnetId: 21356
        revision: 3
        datasource:
          - {name: DS_PROMETHEUS, value: Prometheus}
      spegel:
        # renovate: depName="Spegel"
        gnetId: 18089
        revision: 1
        datasource:
          - {name: DS_PROMETHEUS, value: Prometheus}

    networking:
      blackbox-exporter:
        # renovate: dashboardName="Blackbox Exporter"
        gnetId: 7587
        revision: 3
        datasource: Prometheus
      speedtest-exporter:
        # renovate: dashboardName="Prometheus Speedtest Exporter"
        gnetId: 22651
        revision: 1
        datasource: Prometheus
      speedtest-exporter-hub:
        # renovate: dashboardName="Speedtest-Exporter Dashboard"
        gnetId: 13665
        revision: 4
        datasource:
          - name: "DS_PROMETHEUS"
            value: Prometheus
      internet-speed:
        gnetId: 13665
        revision: 1
        datasource: Prometheus

      unifi-insights:
        # renovate: dashboardName="UniFi-Poller: Client Insights - Prometheus"
        gnetId: 11315
        revision: 9
        datasource: Prometheus
      unifi-network-sites:
        # renovate: dashboardName="UniFi-Poller: Network Sites - Prometheus"
        gnetId: 11311
        revision: 5
        datasource: Prometheus
      unifi-uap:
        # renovate: dashboardName="UniFi-Poller: UAP Insights - Prometheus"
        gnetId: 11314
        revision: 10
        datasource: Prometheus
      unifi-usw:
        # renovate: dashboardName="UniFi-Poller: USW Insights - Prometheus"
        gnetId: 11312
        revision: 9
        datasource: Prometheus
      # Envoy Gateway Dashboards
      envoy-overview:
        # renovate: dashboardName="Envoy Proxy Overview"
        gnetId: 24459
        revision: 2
        datasource: Prometheus
      envoy-upstream:
        # renovate: dashboardName="Envoy Proxy Upstream"
        gnetId: 24457
        revision: 1
        datasource: Prometheus
      envoy-downstream:
        # renovate: dashboardName="Envoy Proxy Downstream"
        gnetId: 24458
        revision: 1
        datasource: Prometheus

    storage:
      # Ref: https://grafana.com/grafana/dashboards/3170-zfs/
      zfs:
        gnetId: 3170
        revision: 3
        datasource: Prometheus
      nfs-server:
        url: https://raw.githubusercontent.com/billimek/k8s-gitops/master/kubernetes/monitoring/grafana/dashboards/nfs_server.json
        datasource: Prometheus

    node-metrics:
      # Ref: https://grafana.com/grafana/dashboards/22413-k8s-node-metrics-multi-clusters-node-exporter-prometheus-grafana11-2024-en/
      1-node-exporter:
        url: https://grafana.com/api/dashboards/22413/revisions/4/download
        datasource: Prometheus
      # Ref: https://grafana.com/grafana/dashboards/1860-node-exporter-full/
      node-exporter-full:
        gnetId: 1860
        revision: 36
        datasource: Prometheus
      node-feature-discovery:
        url: https://raw.githubusercontent.com/kubernetes-sigs/node-feature-discovery/master/examples/grafana-dashboard.json
        datasource:
          - {name: DS_PROMETHEUS, value: Prometheus}
      ups:
        url: https://raw.githubusercontent.com/billimek/k8s-gitops/master/monitoring/grafana/dashboards/ups.json
        datasource: Prometheus
      prometheus-exporter-summary:
        url: https://raw.githubusercontent.com/billimek/k8s-gitops/master/monitoring/grafana/dashboards/prometheus_exporter_summary.json
        datasource: Prometheus

        #old

      external-secrets:
        url: https://raw.githubusercontent.com/external-secrets/external-secrets/main/docs/snippets/dashboard.json
        datasource: Prometheus
      # Ref: https://grafana.com/grafana/dashboards/13177-ipmi-for-prometheus/
      ipmi:
        gnetId: 13177
        revision: 2
        datasource: Prometheus

      trivy:
        url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-addons-trivy-operator.json
        datasource:
          - { name: DS_PROMETHEUS, value: Prometheus }


    kubernetes:
      k8s-system-api-server:
        # renovate: dashboardName="Kubernetes / System / API Server"
        gnetId: 15761
        revision: 20
        datasource: Prometheus
      k8s-system-coredns:
        # renovate: dashboardName="Kubernetes / System / CoreDNS"
        gnetId: 15762
        revision: 22
        datasource: Prometheus
      k8s-views-global:
        # renovate: dashboardName="Kubernetes / Views / Global"
        gnetId: 15757
        revision: 43
        datasource: Prometheus
      k8s-views-nodes:
        # renovate: dashboardName="Kubernetes / Views / Nodes"
        gnetId: 15759
        revision: 40
        datasource: Prometheus
      k8s-views-namespaces:
        # renovate: dashboardName="Kubernetes / Views / Namespaces"
        gnetId: 15758
        revision: 44
        datasource: Prometheus
      k8s-views-pods:
        # renovate: dashboardName="Kubernetes / Views / Pods"
        gnetId: 15760
        revision: 37
        datasource: Prometheus
      k8s-volumes:
        # renovate: dashboardName="K8s / Storage / Volumes / Cluster"
        gnetId: 11454
        revision: 14
        datasource: Prometheus
      k8s-pvc-stats:
        # renovate: dashboardName="Kubernetes PVC Stats"
        gnetId: 23233
        revision: 6
        datasource:
          - { name: DS_PROMETHEUS, value: Prometheus }
      # kube-prometheus-stack dashboards
      kube-prometheus-dashboards:
        url: https://raw.githubusercontent.com/prometheus-operator/kube-prometheus/main/manifests/grafana-dashboardDefinitions.yaml
        datasource: Prometheus

    teslamate:
      battery-health:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/battery-health.json
      charge-level:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/charge-level.json
      charges:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/charges.json
      charging-stats:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/charging-stats.json
      drive-stats:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/drive-stats.json
      drives:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/drives.json
      efficiency:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/efficiency.json
      locations:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/locations.json
      mileage:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/mileage.json
      overview:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/overview.json
      projected-range:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/projected-range.json
      states:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/states.json
      statistics:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/statistics.json
      timeline:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/timeline.json
      trip:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/trip.json
      updates:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/updates.json
      vampire-drain:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/vampire-drain.json
      visited:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/visited.json
      charge-details:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/internal/charge-details.json
      drive-details:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/internal/drive-details.json
      home-assistant:
        url: https://raw.githubusercontent.com/teslamate-org/teslamate/master/grafana/dashboards/internal/home.json

  sidecar:
    datasources:
      enabled: true
      searchNamespace: ALL
      labelValue: ""
    dashboards:
      enabled: true
      searchNamespace: ALL
      label: grafana_dashboard
      folderAnnotation: grafana_folder
      provider:
        disableDelete: true
        foldersFromFilesStructure: true
  persistence:
    enabled: false
  testFramework:
    enabled: false

  datasources:
    datasources.yaml:
      apiVersion: 1
      # list of datasources that should be deleted from the database
      deleteDatasources:
        - name: Alertmanager
          orgId: 1
        - name: Prometheus
          orgId: 1
        - name: VictoriaLogs
          orgId: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://vmsingle-stack.monitoring.svc.cluster.local:8428
          isDefault: true
          jsonData:
            timeInterval: "15s"
            queryTimeout: "60s"
            httpMethod: POST
        - name: VictoriaLogs
          type: victoriametrics-logs-datasource
          access: proxy
          url: http://victoria-logs.logs.svc.cluster.local:9428
        - name: Alertmanager
          type: alertmanager
          access: proxy
          url: http://vmalertmanager-stack.monitoring.svc.cluster.local:9093
          jsonData:
            implementation: prometheus
            handleGrafanaManagedAlerts: true
        - name: TeslaMate
          type: postgres
          access: proxy
          url: postgres-lb.kube-system.svc.cluster.local:5432
          database: teslamate
          user: teslamate
          secureJsonData:
            password: "$TESLAMATE_DB_PASSWORD"
          jsonData:
            postgresVersion: 1000
            sslmode: disable
            database: teslamate
  grafana.ini:
    auth:
      oauth_allow_insecure_email_lookup: false
    auth.basic:
      disable_login_form: true
    auth.generic_oauth:
      enabled: true
      allow_sign_up: true
      auto_login: false
      team_ids:
      allowed_organizations:
      name: pocket-id
      scopes: openid email profile groups
      auth_url: https://pi.rsr.net/authorize
      token_url: http://pocket-id.kube-system.svc.cluster.local:1411/api/oidc/token
      api_url: http://pocket-id.kube-system.svc.cluster.local:1411/api/oidc/userinfo
    auth.generic_oauth.group_mapping:
      role_attribute_path: |
        contains(groups[*], 'admin') && 'Admin' || contains(groups[*], 'editor') && 'Editor' || 'Viewer' 

  route:
    main:
      enabled: true
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      annotations:
        gethomepage.dev/enabled: "true"
        gethomepage.dev/group: Monitoring
        gethomepage.dev/icon: grafana
        gethomepage.dev/name: Grafana
      parentRefs:
        - name: internal
          namespace: kube-system
      hostnames:
        - grafana.rsr.net
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: grafana
              port: 80
